<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Acólitos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --verde: #1a5c3a;
            --verde-claro: #2e8b5b;
            --dourado: #c9a84c;
            --dourado-claro: #f0d080;
            --creme: #fdf8f0;
            --branco: #ffffff;
            --cinza: #7a7a7a;
            --vermelho: #c0392b;
            --sombra: rgba(26,92,58,0.13);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--creme);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px 60px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(26,92,58,0.10) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .topo {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            animation: fadeDown 0.7s ease both;
        }

        .topo .cruz { font-size: 38px; margin-bottom: 4px; filter: drop-shadow(0 2px 8px rgba(201,168,76,0.4)); }

        .topo h1 {
            font-family: 'Cinzel', serif;
            color: var(--verde);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .topo p {
            color: var(--dourado);
            font-size: 0.82rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 700;
        }

        .separador {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--dourado), transparent);
            margin: 12px auto 0;
        }

        .card {
            background: var(--branco);
            border-radius: 18px;
            box-shadow: 0 8px 40px var(--sombra), 0 1px 0 rgba(201,168,76,0.2);
            width: 100%;
            max-width: 440px;
            padding: 28px 24px 32px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.7s ease 0.1s both;
            border-top: 4px solid var(--dourado);
        }

        .btn-admin-flutuante {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 22px;
            color: var(--verde);
            opacity: 0.45;
            transition: opacity 0.2s, transform 0.2s;
        }
        .btn-admin-flutuante:hover { opacity: 1; transform: scale(1.15); }

        #admin-panel {
            display: none;
            background: #f4f9f6;
            border: 1.5px solid #b8dcc8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            animation: fadeUp 0.3s ease both;
        }

        #admin-panel h3 {
            font-family: 'Cinzel', serif;
            color: var(--verde);
            font-size: 0.95rem;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }

        .btn-admin-entrar {
            width: 100%;
            margin-top: 10px;
            background: var(--verde);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-admin-entrar:hover { background: var(--verde-claro); }

        #foto-perfil {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            display: none;
            margin: 0 auto 18px;
            border: 3px solid var(--dourado);
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(201,168,76,0.25);
            animation: popIn 0.35s ease both;
        }

        .campo-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--verde);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-top: 18px;
        }

        select, input[type="text"], input[type="password"] {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid #d4e8db;
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            color: #222;
            background: var(--creme);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            appearance: none;
        }

        select:focus, input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--verde-claro);
            box-shadow: 0 0 0 3px rgba(46,139,91,0.12);
            background: #fff;
        }

        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--verde);
            pointer-events: none;
            font-size: 14px;
        }

        .chips-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .chip {
            padding: 8px 16px;
            border-radius: 50px;
            border: 1.5px solid #cde4d8;
            background: var(--creme);
            color: var(--verde);
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
        }

        .chip:hover { border-color: var(--verde-claro); background: #e8f5ee; transform: translateY(-1px); }
        .chip.selecionado {
            background: var(--verde);
            color: var(--branco);
            border-color: var(--verde);
            box-shadow: 0 3px 10px rgba(26,92,58,0.22);
        }

        .btn-confirmar {
            width: 100%;
            background: linear-gradient(135deg, var(--verde), var(--verde-claro));
            color: var(--branco);
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Lato', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-confirmar:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
        .btn-confirmar:disabled { opacity: 0.7; cursor: not-allowed; }

        #mensagem-sucesso {
            display: none;
            background: #e8f5ee;
            border: 1.5px solid #a3d4b5;
            border-radius: 10px;
            padding: 14px;
            margin-top: 16px;
            color: var(--verde);
            font-weight: 700;
            text-align: center;
            font-size: 0.95rem;
        }

        #mensagem-erro {
            display: none;
            background: #fdecea;
            border: 1.5px solid #f5c6c2;
            border-radius: 10px;
            padding: 14px;
            margin-top: 16px;
            color: var(--vermelho);
            font-weight: 700;
            text-align: center;
            font-size: 0.95rem;
        }

        /* ===== PAINEL ADMIN COMPLETO ===== */
        #painel-registros {
            display: none;
            margin-top: 20px;
            animation: fadeUp 0.4s ease both;
        }

        #painel-registros h4 {
            font-family: 'Cinzel', serif;
            color: var(--verde);
            font-size: 1rem;
            margin-bottom: 14px;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--dourado);
            padding-bottom: 10px;
        }

        .contador-badge {
            display: inline-block;
            background: var(--dourado);
            color: #fff;
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Botões de exportação */
        .export-row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .btn-export {
            flex: 1;
            padding: 11px 8px;
            border: none;
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-export:hover { opacity: 0.88; transform: translateY(-1px); }

        .btn-xlsx {
            background: linear-gradient(135deg, #1d6f42, #21a366);
            color: white;
        }

        .btn-csv {
            background: linear-gradient(135deg, #2d6a9f, #3a8fd1);
            color: white;
        }

        .btn-limpar {
            width: 100%;
            padding: 9px;
            border: 1.5px solid #f5c6c2;
            border-radius: 8px;
            background: #fff;
            color: var(--vermelho);
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-limpar:hover { background: #fdecea; }

        /* Tabela de registros */
        .tabela-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1.5px solid #d4e8db;
            max-height: 280px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead tr {
            background: var(--verde);
            color: white;
            position: sticky;
            top: 0;
        }

        thead th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #e8f2ed;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #f0faf5; }
        tbody tr:last-child { border-bottom: none; }

        tbody td {
            padding: 9px 12px;
            color: #333;
            white-space: nowrap;
        }

        .sem-registros {
            text-align: center;
            color: var(--cinza);
            font-size: 13px;
            padding: 20px;
            font-style: italic;
        }

        .rodape {
            margin-top: 28px;
            font-size: 0.72rem;
            color: var(--cinza);
            text-align: center;
            letter-spacing: 0.5px;
            z-index: 1;
            position: relative;
        }

        @keyframes fadeDown { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform: translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform: translateY(18px);  } to { opacity:1; transform: translateY(0); } }
        @keyframes popIn    { from { opacity:0; transform: scale(0.8); } to { opacity:1; transform: scale(1); } }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="topo">
        <div class="cruz">✝️</div>
        <h1>Escala de Acólitos</h1>
        <p>Paróquia Perpétuo Socorro</p>
        <div class="separador"></div>
    </div>

    <div class="card">

        <button class="btn-admin-flutuante" onclick="toggleAdmin()" title="Acesso administrador">🔐</button>

        <!-- Painel Admin -->
        <div id="admin-panel">
            <h3>🔒 Acesso Administrador</h3>
            <input type="password" id="senhaAdmin" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') verificarSenha()">
            <button class="btn-admin-entrar" onclick="verificarSenha()">Entrar</button>
        </div>

        <!-- Painel de registros (visível após login admin) -->
        <div id="painel-registros">
            <h4>📋 Registros <span class="contador-badge" id="contador">0</span></h4>

            <div class="export-row">
                <button class="btn-export btn-xlsx" onclick="exportarXLSX()">
                    📊 Baixar Excel (.xlsx)
                </button>
                <button class="btn-export btn-csv" onclick="exportarCSV()">
                    📄 Baixar CSV
                </button>
            </div>

            <div class="tabela-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>Dia</th>
                            <th>Horário</th>
                            <th>Registrado em</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body">
                        <tr><td colspan="5" class="sem-registros">Nenhum registro ainda.</td></tr>
                    </tbody>
                </table>
            </div>

            <button class="btn-limpar" onclick="limparRegistros()">🗑️ Limpar todos os registros</button>
        </div>

        <!-- Foto de perfil -->
        <img id="foto-perfil" src="" alt="Foto do acólito">

        <!-- Dia da semana -->
        <label class="campo-label">📅 Dia da Semana</label>
        <div class="select-wrap">
            <select id="diaSemana" onchange="atualizarHorarios()">
                <option value="Sábado">Sábado</option>
                <option value="Domingo" selected>Domingo</option>
            </select>
        </div>

        <!-- Horário - chips -->
        <label class="campo-label">⏰ Horário da Missa</label>
        <div class="chips-wrap" id="chips-horario"></div>
        <input type="hidden" id="horarioMissa">

        <!-- Nome -->
        <label class="campo-label">👤 Seu Nome</label>
        <input type="text" id="nomeAcolito" list="listaNomes" placeholder="Digite seu nome" oninput="buscarFoto(this.value)" autocomplete="off">
        <datalist id="listaNomes">
            <option value="Bruno">
            <option value="João">
            <option value="Pedro">
            <option value="Lucas">
            <option value="Mateus">
            <option value="Rafael">
        </datalist>

        <!-- Botão confirmar -->
        <button class="btn-confirmar" id="btnSalvar" onclick="salvarRegistro()">
            Confirmar Presença
        </button>

        <div id="mensagem-sucesso">✅ Presença registrada com sucesso!<br><small style="font-weight:400;font-size:0.82rem;">Obrigado, que Deus te abençoe! 🙏</small></div>
        <div id="mensagem-erro">❌ Erro ao salvar. Tente novamente.</div>
    </div>

    <div class="rodape">Sistema de Escala Pastoral · Desenvolvido com 🙏</div>

    <script>
        // =============================================
        // ⚙️ CONFIGURAÇÕES
        // =============================================
        const SENHA_ADMIN = "euseiasenha";

        const HORARIOS = {
            "Sábado":  ["08:00", "18:00"],
            "Domingo": ["07:00", "08:30", "10:00", "12:00", "17:00", "19:00", "21:00"]
        };

        const FOTOS = {
            "Bruno":  "https://api.dicebear.com/7.x/avataaars/svg?seed=Bruno",
            "João":   "https://api.dicebear.com/7.x/avataaars/svg?seed=Joao",
            "Pedro":  "https://api.dicebear.com/7.x/avataaars/svg?seed=Pedro",
            "Lucas":  "https://api.dicebear.com/7.x/avataaars/svg?seed=Lucas",
            "Mateus": "https://api.dicebear.com/7.x/avataaars/svg?seed=Mateus",
            "Rafael": "https://api.dicebear.com/7.x/avataaars/svg?seed=Rafael"
        };

        const STORAGE_KEY = "escala_acolitos_registros";
        let adminLogado = false;
        let horarioSelecionado = null;

        // =============================================
        // HORÁRIOS / CHIPS
        // =============================================
        function atualizarHorarios() {
            const dia = document.getElementById('diaSemana').value;
            const wrap = document.getElementById('chips-horario');
            wrap.innerHTML = '';
            horarioSelecionado = null;
            document.getElementById('horarioMissa').value = '';

            HORARIOS[dia].forEach(hora => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.type = 'button';
                chip.textContent = hora;
                chip.onclick = () => selecionarHorario(hora, chip);
                wrap.appendChild(chip);
            });
        }

        function selecionarHorario(hora, el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selecionado'));
            el.classList.add('selecionado');
            horarioSelecionado = hora;
            document.getElementById('horarioMissa').value = hora;
        }

        function buscarFoto(nome) {
            const img = document.getElementById('foto-perfil');
            const chave = Object.keys(FOTOS).find(k => k.toLowerCase() === nome.toLowerCase());
            if (chave) {
                img.src = FOTOS[chave];
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }

        // =============================================
        // ADMIN
        // =============================================
        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            if (p.style.display === 'none') {
                document.getElementById('painel-registros').style.display = 'none';
                adminLogado = false;
            }
        }

        function verificarSenha() {
            const senha = document.getElementById('senhaAdmin').value;
            if (senha === SENHA_ADMIN) {
                adminLogado = true;
                document.getElementById('admin-panel').style.display = 'none';
                mostrarPainelRegistros();
            } else {
                alert("❌ Senha incorreta!");
            }
        }

        function mostrarPainelRegistros() {
            const painel = document.getElementById('painel-registros');
            painel.style.display = 'block';
            renderizarTabela();
        }

        // =============================================
        // ARMAZENAMENTO LOCAL
        // =============================================
        function getRegistros() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        function salvarRegistros(lista) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
        }

        // =============================================
        // SALVAR PRESENÇA
        // =============================================
        function salvarRegistro() {
            const nome = document.getElementById('nomeAcolito').value.trim();
            const horario = document.getElementById('horarioMissa').value;
            const dia = document.getElementById('diaSemana').value;

            if (!nome) { alert("⚠️ Por favor, digite seu nome!"); return; }
            if (!horario) { alert("⚠️ Por favor, selecione um horário!"); return; }

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Salvando...';
            document.getElementById('mensagem-sucesso').style.display = 'none';
            document.getElementById('mensagem-erro').style.display = 'none';

            try {
                const registros = getRegistros();
                const novo = {
                    id: Date.now(),
                    nome,
                    dia,
                    horario,
                    dataRegistro: new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })
                };
                registros.push(novo);
                salvarRegistros(registros);

                document.getElementById('mensagem-sucesso').style.display = 'block';
                btn.innerHTML = '✅ Confirmado!';
                btn.style.background = 'linear-gradient(135deg, #2d8653, #3dba72)';

                if (adminLogado) renderizarTabela();

                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = 'Confirmar Presença';
                    btn.style.background = '';
                    document.getElementById('mensagem-sucesso').style.display = 'none';
                    document.getElementById('nomeAcolito').value = '';
                    document.getElementById('foto-perfil').style.display = 'none';
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selecionado'));
                    horarioSelecionado = null;
                    document.getElementById('horarioMissa').value = '';
                }, 4000);

            } catch (e) {
                document.getElementById('mensagem-erro').style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Confirmar Presença';
            }
        }

        // =============================================
        // RENDERIZAR TABELA
        // =============================================
        function renderizarTabela() {
            const registros = getRegistros();
            const tbody = document.getElementById('tabela-body');
            const contador = document.getElementById('contador');
            contador.textContent = registros.length;

            if (registros.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="sem-registros">Nenhum registro ainda.</td></tr>';
                return;
            }

            tbody.innerHTML = registros.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${r.nome}</strong></td>
                    <td>${r.dia}</td>
                    <td>${r.horario}</td>
                    <td>${r.dataRegistro}</td>
                </tr>
            `).join('');
        }

        // =============================================
        // EXPORTAR XLSX
        // =============================================
        function exportarXLSX() {
            const registros = getRegistros();
            if (registros.length === 0) { alert("⚠️ Nenhum registro para exportar!"); return; }

            const dados = [
                ["#", "Nome", "Dia", "Horário", "Data de Registro"],
                ...registros.map((r, i) => [i + 1, r.nome, r.dia, r.horario, r.dataRegistro])
            ];

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(dados);

            // Largura das colunas
            ws['!cols'] = [
                { wch: 5 },
                { wch: 20 },
                { wch: 12 },
                { wch: 12 },
                { wch: 22 }
            ];

            XLSX.utils.book_append_sheet(wb, ws, "Escala Acólitos");

            const data = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
            XLSX.writeFile(wb, `escala_acolitos_${data}.xlsx`);
        }

        // =============================================
        // EXPORTAR CSV
        // =============================================
        function exportarCSV() {
            const registros = getRegistros();
            if (registros.length === 0) { alert("⚠️ Nenhum registro para exportar!"); return; }

            const linhas = [
                ["#", "Nome", "Dia", "Horário", "Data de Registro"],
                ...registros.map((r, i) => [i + 1, r.nome, r.dia, r.horario, r.dataRegistro])
            ];

            const csvContent = linhas
                .map(row => row.map(cel => `"${String(cel).replace(/"/g, '""')}"`).join(";"))
                .join("\n");

            const BOM = "\uFEFF"; // Para acentos no Excel
            const blob = new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            const data = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
            a.href = url;
            a.download = `escala_acolitos_${data}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // =============================================
        // LIMPAR REGISTROS
        // =============================================
        function limparRegistros() {
            const registros = getRegistros();
            if (registros.length === 0) { alert("⚠️ Não há registros para limpar."); return; }
            if (confirm(`⚠️ Tem certeza? Isso apagará TODOS os ${registros.length} registros permanentemente!`)) {
                localStorage.removeItem(STORAGE_KEY);
                renderizarTabela();
            }
        }

        // Inicializar
        atualizarHorarios();
    </script>
</body>
</html>
